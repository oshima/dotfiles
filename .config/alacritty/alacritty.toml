[colors.bright]
black = "#424242"
blue = "#7aa6da"
cyan = "#70c0b1"
green = "#b9ca4a"
magenta = "#c397d8"
red = "#d54e53"
white = "#eaeaea"
yellow = "#e7c547"

[colors.normal]
black = "#2a2a2a"
blue = "#7aa6da"
cyan = "#70c0b1"
green = "#b9ca4a"
magenta = "#c397d8"
red = "#d54e53"
white = "#969896"
yellow = "#e7c547"

[colors.primary]
background = "#000000"
foreground = "#eaeaea"

[cursor.style]
blinking = "Never"

[font]
size = 13.0

[font.glyph_offset]
x = 0
y = 3

[font.normal]
family = "Monaco"

[font.offset]
x = 1
y = 1

[[keyboard.bindings]]
chars = "\u001F"
key = "Slash"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0018@c,"
key = "Comma"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0018@c-"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0018@c."
key = "Period"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0018@c;"
key = "Semicolon"
mods = "Control"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[window]
option_as_alt = "Both"
